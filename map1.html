<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CRHS Top Floor Map</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body onload="insertHTML()">
    <header class="site-header">
      <div class="header-inner">
        <img src="img/CRHS logo.png" alt="CRHS logo" class="logo" />
        <div class="brand-text">
          <span class="brand-title">Charlottetown Rural High School</span>
          <span class="brand-subtitle">Top Floor Map</span>
        </div>
      </div>
    </header>

    <main class="page-content">
      <section class="hero-panel hero-small">
        <div class="hero-copy">
          <p class="hero-label">Top Floor Navigation</p>
          <h1>View the top floor layout</h1>
          <p>Select your hallway to see the correct route from your scanned room.</p>
        </div>
      </section>

      <section class="map-section">
        <div class="mapcard">
          <div class="mapflex"></div>
          <div class="action-row">
            <a class="button secondary" href="index.html">Back to Home</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Charlottetown Rural High School</p>
    </footer>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="script.js" defer></script>
  </body>
</html>
