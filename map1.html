<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CRHS Top Floor Map</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body onload="insertHTML()">
    <header class="top-bar">
      <div class="top-bar-inner">
        <img src="img/CRHS logo.png" alt="CRHS logo" class="logo" />
        <div class="title-box">
          <span class="main-title">Charlottetown Rural High School</span>
          <span class="sub-title">Top Floor Map</span>
        </div>
      </div>
    </header>

    <main class="main-area">
      <section class="big-banner smaller-banner">
        <div class="banner-copy">
          <p class="small-label">Top Floor Navigation</p>
          <h1>View the top floor layout</h1>
          <p>Select your hallway to see the correct route from your scanned room.</p>
        </div>
      </section>

      <section class="map-area">
        <div class="map-box">
          <div class="mapflex"></div>
          <div class="action-row">
            <a class="button secondary" href="index.html">Back to Home</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="page-footer">
      <p>Charlottetown Rural High School</p>
    </footer>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="script.js" defer></script>
  </body>
</html>
