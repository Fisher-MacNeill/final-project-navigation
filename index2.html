<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>QR Scanner</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
      body {
        font-family: Arial;
        text-align: center;
        padding-top: 30px;
      }

      #reader {
        width: 300px;
        margin: auto;
      }

      button {
        padding: 10px 20px;
        font-size: 18px;
      }

      #result {
        margin-top: 20px;
        color: green;
      }

      #error {
        margin-top: 20px;
        color: red;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>QR Scanner</h1>

    <button id="scanBtn">Start Scanner</button>

    <div id="reader"></div>

    <div id="result"></div>
    <div id="error"></div>

    <script>
      let html5QrCode;

      document.getElementById("scanBtn").addEventListener("click", async () => {
        document.getElementById("error").innerText = "";

        try {
          // Check camera permissions
          const devices = await Html5Qrcode.getCameras();

          if (devices && devices.length) {
            const cameraId = devices[0].id;

            html5QrCode = new Html5Qrcode("reader");

            await html5QrCode.start(
              { facingMode: "environment" }, // back camera
              {
                fps: 10,
                qrbox: 250,
              },
              (decodedText) => {
                document.getElementById("result").innerText =
                  "QR Code: " + decodedText;

                html5QrCode.stop();
              },
              (errorMessage) => {
                // Ignore scan errors
              }
            );
          } else {
            document.getElementById("error").innerText = "No cameras found.";
          }
        } catch (err) {
          console.error(err);

          document.getElementById("error").innerText =
            "Scanner failed:\n\n" + err;
        }
      });
    </script>
  </body>
</html>
