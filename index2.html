<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Scanner</title>

    <!-- QR Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 40px;
      }

      #reader {
        width: 300px;
        margin: 20px auto;
      }

      button {
        padding: 12px 20px;
        font-size: 16px;
        cursor: pointer;
      }

      #result {
        margin-top: 20px;
        font-size: 18px;
        color: green;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <h1>QR Code Scanner</h1>

    <button onclick="startScanner()">Scan QR Code</button>

    <div id="reader"></div>

    <div id="result"></div>

    <script>
      let scanner;

      function startScanner() {
        // Prevent multiple scanners
        if (scanner) return;

        scanner = new Html5Qrcode("reader");

        scanner
          .start(
            { facingMode: "environment" }, // back camera
            {
              fps: 10,
              qrbox: 250,
            },
            (decodedText) => {
              // QR successfully scanned
              document.getElementById("result").innerHTML =
                "Scanned QR Code: " + decodedText;

              // Stop scanner after successful scan
              scanner.stop().then(() => {
                scanner = null;
              });
            },
            (errorMessage) => {
              // ignore scan errors
            }
          )
          .catch((err) => {
            console.error(err);
            alert("Unable to start scanner");
          });
      }
    </script>
  </body>
</html>
