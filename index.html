<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Charlottetown Rural High School Navigation</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-bar">
      <div class="top-bar-inner">
        <img src="img/CRHS logo.png" alt="CRHS logo" class="logo" />
        <div class="title-box">
          <span class="main-title">Charlottetown Rural High School</span>
          <span class="sub-title">Hallway Navigation</span>
        </div>
      </div>
    </header>

    <main class="main-area">
      <section class="big-banner">
        <div class="banner-copy">
          <p class="small-label">School Navigation</p>
          <h1>Find your way around CRHS</h1>
          <p>Scan a hallway QR code to quickly find the best path to your desired location!</p>
          <div class="banner-actions">
            <button id="scanBtn">Start QR Scanner</button>
            <!-- <a class="button secondary" href="map1.html">View Top Floor Map</a> -->
          </div>
        </div>
      </section>

      <section class="scanner-area">
        <div class="scanner-box">
          <h2>QR Scanner</h2>
          <div id="reader" class="scanner-view"></div>
          <div id="result" class="feedback-text"></div>
          <div id="error" class="error-text"></div>
        </div>
      </section>
    </main>

    <footer class="page-footer">
      <p>Charlottetown Rural High School</p>
    </footer>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="script.js" defer></script>
  </body>
</html>
